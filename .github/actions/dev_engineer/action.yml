name: AI Dev Engineer
description: "Reads an issue and creates a PR with AI code fixes"
inputs:
  ANTHROPIC_API_KEY:
    description: "Required API key"
    required: true
  GITHUB_TOKEN:
    description: "Token to perform git operations"
    required: true
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install -r ${{ github.action_path }}/../../../requirements.txt
      shell: bash

    - name: Run AI Dev Agent
      run: python ${{ github.action_path }}/run.py
      shell: bash
      env:
        # Pass inputs into the script environment
        ANTHROPIC_API_KEY: ${{ inputs.ANTHROPIC_API_KEY }}
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        
        # Add the root of repo2 to PYTHONPATH so 'import ai_agent' works
        PYTHONPATH: ${{ github.action_path }}/../../..
        
        # Contextual info passed from the caller's environment
        REPO_FULL_NAME: ${{ github.repository }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        TRIGGER_COMMENT: ${{ github.event.comment.body }}
        EVENT_NAME: ${{ github.event_name }}