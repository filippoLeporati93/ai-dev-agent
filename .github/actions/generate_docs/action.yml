name: AI Generate Docs
description: "Generate Docs based on actual code"
inputs:
  ANTHROPIC_API_KEY:
    description: 'API Key for Anthropic'
    required: true
  GITHUB_TOKEN:
    description: 'Token for GitHub API'
    required: true
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install -r ${{ github.action_path }}/../../../requirements.txt
      shell: bash

    - name: Run AI Docs Generator
      run: python ${{ github.action_path }}/run.py
      shell: bash
      env:
        # We explicitly pass inputs to the environment for the Python script
        ANTHROPIC_API_KEY: ${{ inputs.ANTHROPIC_API_KEY }}
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        # CRITICAL: This tells Python where to find your 'ai_agent' package
        PYTHONPATH: ${{ github.action_path }}/../../..
        GITHUB_WORKSPACE: ${{ github.workspace }}
        GITHUB_REPOSITORY: ${{ github.repository }}